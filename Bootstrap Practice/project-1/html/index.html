<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Dream71 IT Corner</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>

    <body>

        <!--  ========== Header ============= -->
        <section class="header">
            <nav class="navbar navbar-expand-lg bg-body-tertiary data-bs-theme="dark"">
                <!-- container = 1100px ,  container-fluid = full width  -->
                <div class="container">
                    <a class="navbar-brand" href="#">Dream71 IT Corner</a>  
                    
                    <button
                        class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNav"
                        aria-controls="navbarNav"
                        aria-expanded="false"
                        aria-label="Toggle navigation"
                    >
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Features</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Pricing</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                            </li>
                        </ul>
                    </div>

                </div>

            </nav>
        </section>


        <!-- ========== Main Container ========= -->
        <section class="main-content">
            <div class="container">

                <!-- =========== Image Slider -> Carousel =============== -->
                <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                      <div class="carousel-item active">
                        <img src="../assets/images/digi1.png" class="d-block w-100" height="350" alt="...">
                      </div>
                      <div class="carousel-item">
                        <img src="../assets/images/digi2.png" class="d-block w-100" height="350" alt="...">
                      </div>
                      <div class="carousel-item">
                        <img src="../assets/images/digi3.png" class="d-block w-100" height="350" alt="...">
                      </div>
                      <div class="carousel-item">
                        <img src="../assets/images/web1.png" class="d-block w-100" height="350" alt="...">
                      </div>
                      <div class="carousel-item">
                        <img src="../assets/images/web2.png" class="d-block w-100" height="350" alt="...">
                      </div>
                    </div>
                </div>
            </div>
        </section>


        <!-- ============= Footer ============ -->
        <section class="footer">
            <div class="p-3 mb-2 bg-dark text-white text-center">
                <h2>Dream71 IT Corner</h2>
                <!-- alt + 0169 = ©  -->
                <p class="copyright"">© 2026 All Rights Reserved.</p>
            </div>
        </section>


        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
